name: Build and Upload to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          ls /Applications/ | grep Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go static library
        run: |
          cd GoSpoofer
          chmod +x make.sh
          ./make.sh

      - name: Generate app icons
        run: |
          # 用纯 Python 生成 PNG（不依赖任何第三方库）
          python3 << 'PYEOF'
          import struct, zlib, os

          def make_png(w, h, r, g, b):
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              raw = b''
              for _ in range(h):
                  raw += b'\x00' + bytes([r, g, b]) * w
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) +
                      chunk(b'IDAT', zlib.compress(raw)) +
                      chunk(b'IEND', b''))

          icon_dir = "Resources/Assets.xcassets/AppIcon.appiconset"
          os.makedirs(icon_dir, exist_ok=True)

          for size in [120, 152, 167, 180, 1024]:
              with open(f"{icon_dir}/icon_{size}x{size}.png", "wb") as f:
                  f.write(make_png(size, size, 0, 122, 255))

          import json
          contents = {
              "images": [
                  {"filename": "icon_120x120.png", "idiom": "iphone", "scale": "2x", "size": "60x60"},
                  {"filename": "icon_180x180.png", "idiom": "iphone", "scale": "3x", "size": "60x60"},
                  {"filename": "icon_152x152.png", "idiom": "ipad", "scale": "2x", "size": "76x76"},
                  {"filename": "icon_167x167.png", "idiom": "ipad", "scale": "2x", "size": "83.5x83.5"},
                  {"filename": "icon_1024x1024.png", "idiom": "ios-marketing", "scale": "1x", "size": "1024x1024"}
              ],
              "info": {"author": "xcode", "version": 1}
          }
          with open(f"{icon_dir}/Contents.json", "w") as f:
              json.dump(contents, f, indent=2)

          print(f"Generated icons in {icon_dir}:")
          for name in os.listdir(icon_dir):
              print(f"  {name} ({os.path.getsize(os.path.join(icon_dir, name))} bytes)")
          PYEOF

      - name: Install Apple certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$CERTIFICATE_P12" | base64 --decode -o $CERT_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profiles
        env:
          APP_PROFILE: ${{ secrets.APP_PROVISIONING_PROFILE }}
          TUNNEL_PROFILE: ${{ secrets.TUNNEL_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$APP_PROFILE" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision
          echo -n "$TUNNEL_PROFILE" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/tunnel.mobileprovision

      - name: Setup App Store Connect API key
        env:
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p $HOME/private_keys
          echo -n "$API_KEY_P8" | base64 --decode -o $HOME/private_keys/AuthKey_N68G775GA2.p8

      - name: Build archive
        run: |
          xcodebuild archive \
            -project location-spoofer.xcodeproj \
            -scheme location-spoofer \
            -archivePath $RUNNER_TEMP/LocationSpoofer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=3MPFZ2L92C \
            -allowProvisioningUpdates \
            -authenticationKeyPath $HOME/private_keys/AuthKey_N68G775GA2.p8 \
            -authenticationKeyID N68G775GA2 \
            -authenticationKeyIssuerID 9aaa8cda-ed99-4624-b2aa-3b4c8b9e3245 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            APP_PROVISIONING_PROFILE="LocationSpoofer AppStore" \
            TUNNEL_PROVISIONING_PROFILE="LocationSpoofer Tunnel AppStore"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/export.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>3MPFZ2L92C</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.whitemirror.location-spoofer</key>
              <string>LocationSpoofer AppStore</string>
              <key>com.whitemirror.location-spoofer.tunnel</key>
              <string>LocationSpoofer Tunnel AppStore</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/LocationSpoofer.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/export.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath $HOME/private_keys/AuthKey_N68G775GA2.p8 \
            -authenticationKeyID N68G775GA2 \
            -authenticationKeyIssuerID 9aaa8cda-ed99-4624-b2aa-3b4c8b9e3245

      - name: Upload to TestFlight
        env:
          API_KEY_ID: N68G775GA2
          API_ISSUER_ID: 9aaa8cda-ed99-4624-b2aa-3b4c8b9e3245
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/*.ipa \
            --type ios \
            --apiKey $API_KEY_ID \
            --apiIssuer $API_ISSUER_ID
