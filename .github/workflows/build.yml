name: Build and Upload to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          ls /Applications/ | grep Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Using $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go static library
        run: |
          cd GoSpoofer
          chmod +x make.sh
          ./make.sh

      - name: Install xcodegen and regenerate project
        run: |
          brew install xcodegen
          cd $GITHUB_WORKSPACE
          xcodegen generate
          # 重新应用 HACKS.md 的 patch：把 libgolocationspoofer.a 从 Resources build phase 移到 Frameworks build phase
          # 检查 pbxproj 中 libgolocationspoofer.a 是否在 PBXResourcesBuildPhase 里，如果是就移到 PBXFrameworksBuildPhase
          python3 << 'PYEOF'
          import re

          with open("location-spoofer.xcodeproj/project.pbxproj", "r") as f:
              content = f.read()

          # 找到 libgolocationspoofer.a 的 PBXBuildFile 引用 ID
          # 然后确保它在 Frameworks phase 而不是 Resources phase
          lines = content.split("\n")

          # 找到 libgolocationspoofer.a 的 file ref
          lib_ref_id = None
          lib_build_id = None
          for line in lines:
              if "libgolocationspoofer.a" in line and "PBXFileReference" not in line and "PBXBuildFile" in line:
                  lib_build_id = line.strip().split(" ")[0]
              if "libgolocationspoofer.a" in line and "PBXFileReference" in line:
                  lib_ref_id = line.strip().split(" ")[0]

          if lib_build_id:
              # Remove from Resources phase and add to Frameworks phase
              in_resources = False
              in_frameworks = False
              new_lines = []
              resources_section = False
              frameworks_section = False

              for i, line in enumerate(lines):
                  if "/* Resources */" in line and "PBXResourcesBuildPhase" in line:
                      resources_section = True
                  if "/* Frameworks */" in line and "PBXFrameworksBuildPhase" in line:
                      frameworks_section = True

                  if resources_section and lib_build_id in line:
                      resources_section = False
                      continue  # skip this line (remove from resources)

                  if frameworks_section and "files = (" in line:
                      new_lines.append(line)
                      # Check if lib is already in frameworks
                      if lib_build_id not in content.split("/* Frameworks */")[1].split("/* End")[0] if "/* Frameworks */" in content else "":
                          new_lines.append(f"\t\t\t\t{lib_build_id} /* libgolocationspoofer.a in Frameworks */,")
                      frameworks_section = False
                      continue

                  new_lines.append(line)

              with open("location-spoofer.xcodeproj/project.pbxproj", "w") as f:
                  f.write("\n".join(new_lines))
              print("HACKS.md patch applied")
          else:
              print("WARNING: libgolocationspoofer.a build ref not found, skipping patch")
          PYEOF

      - name: Install Apple certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$CERTIFICATE_P12" | base64 --decode -o $CERT_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profiles
        env:
          APP_PROFILE: ${{ secrets.APP_PROVISIONING_PROFILE }}
          TUNNEL_PROFILE: ${{ secrets.TUNNEL_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$APP_PROFILE" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision
          echo -n "$TUNNEL_PROFILE" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/tunnel.mobileprovision

      - name: Setup App Store Connect API key
        env:
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p $HOME/private_keys
          echo -n "$API_KEY_P8" | base64 --decode -o $HOME/private_keys/AuthKey_N68G775GA2.p8

      - name: Build archive
        run: |
          xcodebuild archive \
            -project location-spoofer.xcodeproj \
            -scheme location-spoofer \
            -archivePath $RUNNER_TEMP/LocationSpoofer.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=3MPFZ2L92C \
            -allowProvisioningUpdates \
            -authenticationKeyPath $HOME/private_keys/AuthKey_N68G775GA2.p8 \
            -authenticationKeyID N68G775GA2 \
            -authenticationKeyIssuerID 9aaa8cda-ed99-4624-b2aa-3b4c8b9e3245 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            APP_PROVISIONING_PROFILE="LocationSpoofer AppStore" \
            TUNNEL_PROVISIONING_PROFILE="LocationSpoofer Tunnel AppStore"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/export.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>3MPFZ2L92C</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.whitemirror.location-spoofer</key>
              <string>LocationSpoofer AppStore</string>
              <key>com.whitemirror.location-spoofer.tunnel</key>
              <string>LocationSpoofer Tunnel AppStore</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/LocationSpoofer.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/export.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath $HOME/private_keys/AuthKey_N68G775GA2.p8 \
            -authenticationKeyID N68G775GA2 \
            -authenticationKeyIssuerID 9aaa8cda-ed99-4624-b2aa-3b4c8b9e3245

      - name: Upload to TestFlight
        env:
          API_KEY_ID: N68G775GA2
          API_ISSUER_ID: 9aaa8cda-ed99-4624-b2aa-3b4c8b9e3245
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/*.ipa \
            --type ios \
            --apiKey $API_KEY_ID \
            --apiIssuer $API_ISSUER_ID
      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPS-Tool-IPA
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30
